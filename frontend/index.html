<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Animais</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <span style="font-size:1.8rem">🐾</span>
  <div><h1>Cadastro de Animais</h1><p>Registro simples de entrada, saída e edição</p></div>
</header>

<main>
  <section class="panel">
    <h2 id="tituloForm">Novo registro</h2>
    <form onsubmit="salvar(event)">
      <label>Nome</label>
      <input id="nome" required placeholder="Ex: Mel">
      <label>Espécie</label>
      <input id="especie" required placeholder="Ex: Gato">
      <label>Idade</label>
      <input id="idade" type="number" min="0" placeholder="Anos">
      <button class="btn" type="submit" id="btnSalvar">Adicionar</button>
      <button class="btn btn-ghost" type="button" id="btnCancelar" onclick="cancelar()" style="display:none">Cancelar edição</button>
    </form>
  </section>

  <section class="panel lista">
    <h2>Animais <span id="contagem"></span></h2>
    <div id="lista"></div>
  </section>
</main>

<script>
const API = "/animais";
let editandoId = null;

async function carregar() {
  const animais = await (await fetch(API)).json();
  const lista = document.getElementById("lista");
  document.getElementById("contagem").textContent = animais.length ? `(${animais.length})` : "";

  lista.innerHTML = animais.length ? animais.map(a => `
    <div class="cartao">
      <div class="info">
        <div class="selo">${(a.nome || "?")[0]}</div>
        <div><div class="nome">${a.nome}</div><div class="meta">${a.especie}${a.idade ? " · " + a.idade + " anos" : ""}</div></div>
      </div>
      <div class="acoes">
        <button onclick='editar(${JSON.stringify(a)})'>✎</button>
        <button class="excluir" onclick="excluir(${a.id})">🗑</button>
      </div>
    </div>`).join("") : `<div class="vazio">Nenhum animal cadastrado ainda.</div>`;
}

async function salvar(e) {
  e.preventDefault();
  const dados = {
    nome: nome.value.trim(),
    especie: especie.value.trim(),
    idade: idade.value || null
  };
  const url = editandoId ? `${API}/${editandoId}` : API;
  await fetch(url, { method: editandoId ? "PUT" : "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(dados) });
  cancelar();
  carregar();
}

function editar(a) {
  nome.value = a.nome; especie.value = a.especie; idade.value = a.idade ?? "";
  editandoId = a.id;
  tituloForm.textContent = "Editando registro";
  btnSalvar.textContent = "Salvar alterações";
  btnCancelar.style.display = "block";
}

function cancelar() {
  nome.value = ""; especie.value = ""; idade.value = "";
  editandoId = null;
  tituloForm.textContent = "Novo registro";
  btnSalvar.textContent = "Adicionar";
  btnCancelar.style.display = "none";
}

async function excluir(id) {
  await fetch(`${API}/${id}`, { method: "DELETE" });
  carregar();
}

carregar();
</script>
</body>
</html>
